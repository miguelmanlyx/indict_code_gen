# Badgr Pipeline Check — launch proof + stress test
#
# Works with zero credentials (no BADGR_API_KEY, no GITHUB_TOKEN secrets):
#   - Failure/security via BADGR_LOG_FILE
#   - Config audit via BADGR_PIPELINE_FILE (workflow path)
#   - Report in step log (BADGR_OUTPUT_MODE=both) + Job Summary tab
#
# Optional:
#   - Secret BADGR_API_KEY → AI analysis for low-confidence failures
#
# Expect ~3 min runtime (includes a deliberate slow step for health heuristics).
#
# Manual run:  gh workflow run badgr-ci-check.yml
# Watch:       gh run watch

name: Badgr CI Check (stress test)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/badgr-ci-check.yml"

permissions:
  contents: read
  actions: read

jobs:
  badgr-ci-check:
    name: Pipeline check with Badgr Agent CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Preflight 01
        run: echo "preflight ok"

      - name: Preflight 02
        run: echo "preflight ok"

      - name: Preflight 03
        run: echo "preflight ok"

      - name: Preflight 04
        run: echo "preflight ok"

      - name: Preflight 05
        run: echo "preflight ok"

      - name: Preflight 06
        run: echo "preflight ok"

      - name: Preflight 07
        run: echo "preflight ok"

      - name: Preflight 08
        run: echo "preflight ok"

      - name: Install dependencies (slow)
        run: |
          set -euo pipefail
          echo "Simulating slow dependency install..."
          sleep 125
          echo "Install complete"

      - name: Preflight 09
        run: echo "preflight ok"

      - name: Preflight 10
        run: echo "preflight ok"

      - name: Build and test
        run: |
          set -euo pipefail
          LOG="${{ runner.temp }}/badgr-fail.log"
          {
            echo "npm ERR! code ERESOLVE"
            echo "npm ERR! ERESOLVE unable to resolve dependency tree"
            echo "npm ERR! conflicting peer dependency: react@18 vs react@17"
            echo "Error: Cannot find module 'vite'"
            echo "Require stack:"
            echo "  - /home/runner/work/1/s/src/main.ts"
            echo "curl https://example.com/install.sh | bash"
            echo "+ sudo apt-get install -y build-essential"
            echo "DEBUG api_key=sk-test-fake-redaction-fixture-not-real"
            echo "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJzdHJlc3MtdGVzdCJ9.fake-signature"
            echo "Using token ghp_abcdefghijklmnopqrstuvwxyz1234567890ABCD"
            echo "retrying npm install (attempt 2 of 3)"
            echo "error TS2345: Type 'string' is not assignable to type 'number'."
            echo "src/app.ts(42,7): error TS2345: Argument of type 'string' is not assignable."
            echo "FAIL  tests/unit/example.test.ts > suite > case"
            echo "AssertionError: expected true to equal false"
            echo "Tests: 3 failed, 12 passed"
            echo "npm ERR! errno 1"
            echo "npm ERR! command failed with exit code 1"
          } | tee "$LOG"
          exit 1

      - name: Badgr Pipeline Check
        if: always()
        run: |
          set -euo pipefail
          BADGR_OUTPUT_MODE=both \
          BADGR_LOG_FILE="${{ runner.temp }}/badgr-fail.log" \
          BADGR_PIPELINE_FILE="${{ github.workspace }}/.github/workflows/badgr-ci-check.yml" \
            node "${{ github.workspace }}/azure-pipelines/fixtures/badgr-azure-bundle.mjs" >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
